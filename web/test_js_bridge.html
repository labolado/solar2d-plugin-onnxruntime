<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ONNX Runtime JS Bridge Test</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script src="plugin_onnxruntime_js.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #4a9eff; }
        .test-section {
            background: #0f0f1a;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            border-left: 4px solid #4a9eff;
        }
        .pass { border-left-color: #4ade80; }
        .fail { border-left-color: #f87171; }
        .warn { border-left-color: #fbbf24; }
        pre {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #3a8eef; }
        .status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pass { background: #4ade80; color: #000; }
        .status-fail { background: #f87171; color: #000; }
        .status-warn { background: #fbbf24; color: #000; }
    </style>
</head>
<body>
    <h1>🧪 ONNX Runtime JS Bridge Test</h1>
    
    <div class="test-section">
        <h3>1. Plugin Availability</h3>
        <div id="test-availability"></div>
    </div>

    <div class="test-section">
        <h3>2. Version Check</h3>
        <div id="test-version"></div>
    </div>

    <div class="test-section">
        <h3>3. Model Loading Test (candy.onnx)</h3>
        <button onclick="testLoadModel()">Test Load Model</button>
        <div id="test-load"></div>
    </div>

    <div class="test-section">
        <h3>4. Inference Test</h3>
        <button onclick="testInference()">Test Inference</button>
        <div id="test-inference"></div>
    </div>

    <div class="test-section">
        <h3>5. Session Info Test</h3>
        <button onclick="testSessionInfo()">Test Session Info</button>
        <div id="test-info"></div>
    </div>

    <script>
        // Mock Lua function handlers for standalone testing
        window.LuaIsFunction = function(ref) { return typeof ref === 'function'; };
        window.LuaCreateFunction = function(ref) { return ref; };
        window.LuaReleaseFunction = function(fn) {};

        const results = {
            availability: false,
            version: null,
            load: null,
            inference: null,
            info: null
        };

        // Test 1: Availability
        function testAvailability() {
            const el = document.getElementById('test-availability');
            try {
                results.availability = plugin_onnxruntime_js.isAvailable();
                if (results.availability) {
                    el.innerHTML = '<span class="status status-pass">PASS</span> onnxruntime-web is available';
                    el.classList.add('pass');
                } else {
                    el.innerHTML = '<span class="status status-fail">FAIL</span> onnxruntime-web not available';
                    el.classList.add('fail');
                }
            } catch (e) {
                el.innerHTML = '<span class="status status-fail">FAIL</span> Error: ' + e.message;
                el.classList.add('fail');
            }
        }

        // Test 2: Version
        function testVersion() {
            const el = document.getElementById('test-version');
            try {
                results.version = plugin_onnxruntime_js.version();
                el.innerHTML = '<span class="status status-pass">PASS</span> Version: ' + results.version;
                el.classList.add('pass');
            } catch (e) {
                el.innerHTML = '<span class="status status-fail">FAIL</span> Error: ' + e.message;
                el.classList.add('fail');
            }
        }

        let testSessionHandle = null;

        // Test 3: Load Model
        function testLoadModel() {
            const el = document.getElementById('test-load');
            el.innerHTML = 'Loading...';
            
            // Use the candy.onnx from example directory (need to copy or adjust path)
            // For this test, we'll try to load from parent directory's example folder
            const modelPath = '../example/candy.onnx';
            
            plugin_onnxruntime_js.load(modelPath, function(handle, error) {
                if (error) {
                    results.load = { success: false, error: error };
                    el.innerHTML = '<span class="status status-fail">FAIL</span> ' + error;
                    el.classList.add('fail');
                } else {
                    testSessionHandle = handle;
                    results.load = { success: true, handle: handle };
                    el.innerHTML = '<span class="status status-pass">PASS</span> Model loaded, session handle: ' + handle;
                    el.classList.add('pass');
                }
            });
        }

        // Test 4: Inference
        function testInference() {
            const el = document.getElementById('test-inference');
            
            if (!testSessionHandle) {
                el.innerHTML = '<span class="status status-warn">SKIP</span> Please load model first';
                el.classList.add('warn');
                return;
            }
            
            el.innerHTML = 'Running inference...';
            
            // Create dummy input for candy.onnx (style transfer model)
            // Typically expects input1 with dims [1, 3, 224, 224]
            const dummyData = [];
            for (let i = 0; i < 3 * 224 * 224; i++) {
                dummyData.push(Math.random());
            }
            
            const inputs = {
                input1: {
                    dims: {1: 1, 2: 3, 3: 224, 4: 224},
                    data: dummyData.reduce((acc, v, i) => { acc[i+1] = v; return acc; }, {}),
                    type: 'float32'
                }
            };
            
            plugin_onnxruntime_js.run(testSessionHandle, inputs, function(outputs, error) {
                if (error) {
                    results.inference = { success: false, error: error };
                    el.innerHTML = '<span class="status status-fail">FAIL</span> ' + error;
                    el.classList.add('fail');
                } else {
                    results.inference = { success: true, outputs: outputs };
                    const outputNames = Object.keys(outputs);
                    el.innerHTML = '<span class="status status-pass">PASS</span> Inference successful!<br>' +
                        'Output names: ' + outputNames.join(', ') + '<br>';
                    if (outputNames.length > 0) {
                        const first = outputs[outputNames[0]];
                        el.innerHTML += 'First output dims: ' + JSON.stringify(first.dims);
                    }
                    el.classList.add('pass');
                }
            });
        }

        // Test 5: Session Info
        function testSessionInfo() {
            const el = document.getElementById('test-info');
            
            if (!testSessionHandle) {
                el.innerHTML = '<span class="status status-warn">SKIP</span> Please load model first';
                el.classList.add('warn');
                return;
            }
            
            const info = plugin_onnxruntime_js.info(testSessionHandle);
            if (info) {
                results.info = info;
                el.innerHTML = '<span class="status status-pass">PASS</span> Session info:<pre>' + 
                    JSON.stringify(info, null, 2) + '</pre>';
                el.classList.add('pass');
            } else {
                el.innerHTML = '<span class="status status-fail">FAIL</span> Could not get session info';
                el.classList.add('fail');
            }
        }

        // Run initial tests
        testAvailability();
        testVersion();
    </script>
</body>
</html>
