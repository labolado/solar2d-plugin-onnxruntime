name: Build Windows Example

on:
  push:
    branches: [build/win32-example]
  workflow_dispatch:

jobs:
  build-win32-example:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download plugins
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "build\plugins" -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/labolado/solar2d-plugin-onnxruntime/releases/download/v6/plugin.onnxruntime-win32-sim.tgz" -OutFile "build\plugins\onnxruntime.tgz"
          Invoke-WebRequest -Uri "https://github.com/solar2d/com.xibalbastudios-plugin.Bytemap/releases/download/v9/2016.2874-win32-sim.tgz" -OutFile "build\plugins\bytemap.tgz"

      - name: Assemble example package
        shell: pwsh
        run: |
          $out = "build\OnnxDemo-Win32"
          New-Item -ItemType Directory -Path "$out\Plugins" -Force | Out-Null

          # Extract plugin DLLs
          tar xzf "build\plugins\onnxruntime.tgz" -C "$out\Plugins"
          tar xzf "build\plugins\bytemap.tgz" -C "$out\Plugins"

          # Copy example project files
          Copy-Item "example\main.lua" -Destination $out
          Copy-Item "example\config.lua" -Destination $out
          Copy-Item "example\build.settings" -Destination $out
          Copy-Item "example\test_photo.png" -Destination $out
          Copy-Item "example\test_photo.dat" -Destination $out
          Copy-Item "example\candy.onnx" -Destination $out
          Copy-Item "example\mosaic.onnx" -Destination $out
          Copy-Item "example\kitten_tts_nano_v0_1.onnx" -Destination $out

          # Create README
          @"
          ONNX Runtime Plugin Demo for Solar2D (Windows)
          ==============================================

          How to run:
          1. Install Solar2D from https://solar2d.com
          2. Copy everything in Plugins\ folder to:
               %APPDATA%\Corona Labs\Corona Simulator\Plugins\
          3. Open Solar2D Simulator
          4. File -> Open Project -> select main.lua in this folder
          "@ | Set-Content "$out\README.txt"

          Write-Host "=== Package contents ==="
          Get-ChildItem $out -Recurse | Select-Object FullName

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path "build\OnnxDemo-Win32\*" -DestinationPath "build\OnnxDemo-Win32-Example.zip" -Force
          $size = (Get-Item "build\OnnxDemo-Win32-Example.zip").Length / 1MB
          Write-Host "Package: OnnxDemo-Win32-Example.zip ($([math]::Round($size, 1)) MB)"

      - uses: actions/upload-artifact@v4
        with:
          name: OnnxDemo-Win32-Example
          path: build/OnnxDemo-Win32-Example.zip
